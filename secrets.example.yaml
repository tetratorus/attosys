# Copy to secrets.yaml, chmod 600. Read by root tooling and the mux only.
# Agents never read this file.

api_key: sk-...                  # LLM provider key

# The single Telegram bot for the whole company. Create one bot in @BotFather
# (/setprivacy -> Disable), add it as an admin to your supergroup, and paste
# its token here. The mux uses this one token to serve every agent's topic;
# agents reach Telegram only through the mux and never see this value.
telegram_bot_token: "1111111111:AAA..."
